name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Pull Docker image from Docker Hub
        run: |
          docker pull sarker24/universal-books-server:latest || (echo "Failed to pull Docker image." && exit 1)

      - name: Delete Old Docker container
        run: sudo docker rm -f universal-books-server || true

      - name: Run Docker Container
        run: sudo docker run -d -p 4002:4002 --name universal-books-server sarker24/universal-books-server
